<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Hamburger</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="GoodHamburger.Blazor.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        #splash {
            position: fixed;
            inset: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 9999;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.5s ease;
        }

            #splash.hide {
                opacity: 0;
                pointer-events: none;
            }

            #splash .splash-icon {
                font-size: 4rem;
                animation: bounce 1s infinite alternate;
            }

            #splash .splash-title {
                font-size: 2rem;
                font-weight: 800;
                color: #ffffff;
                letter-spacing: 2px;
            }

                #splash .splash-title span {
                    color: #ffc300;
                }

            #splash .splash-msg {
                color: #aaa;
                font-size: 0.95rem;
                letter-spacing: 1px;
            }

            #splash .splash-bar {
                width: 200px;
                height: 4px;
                background-color: #2d2d2d;
                border-radius: 99px;
                overflow: hidden;
            }

            #splash .splash-bar-fill {
                height: 100%;
                width: 0%;
                background-color: #ffc300;
                border-radius: 99px;
                animation: load 2s ease forwards;
            }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-12px);
            }
        }

        @keyframes load {
            from {
                width: 0%;
            }

            to {
                width: 100%;
            }
        }

        #blazor-error-ui {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="splash">
        <div class="splash-icon">🍔</div>
        <div class="splash-title">GOOD <span>HAMBURGER</span></div>
        <div class="splash-msg">Carregando...</div>
        <div class="splash-bar">
            <div class="splash-bar-fill"></div>
        </div>
    </div>
    <div id="app"></div>
    <div id="blazor-error-ui"></div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
    <script>
        Blazor.start().then(() => {
            const splash = document.getElementById('splash');
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
        });
    </script>
</body>
</html>
